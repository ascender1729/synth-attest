name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # Proves the project is genuinely independent: the core runs with ZERO proprietary deps.
  core-no-proprietary-deps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core only (no attestix)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Assert attestix is NOT installed (independence proof)
        run: |
          python - <<'PY'
          try:
              import attestix  # noqa
              raise SystemExit("attestix should not be present in the core job")
          except ImportError:
              print("OK: core has no proprietary dependency")
          PY
      - name: Test core (StubEngine; attestix-backed tests self-skip)
        run: pytest -q -rs

  # Validates the OPTIONAL attestix backend source-blind against the published wheel.
  optional-attestix-backend:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with the optional attestix extra (published wheel)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,attestix]"
      - name: Assert attestix resolves from the registry, not a dev tree
        run: |
          python - <<'PY'
          import attestix, pathlib
          p = pathlib.Path(attestix.__file__).resolve()
          assert "site-packages" in str(p).replace("\\", "/"), f"not from registry: {p}"
          print("OK source-blind:", attestix.__version__, p)
          PY
      - name: Test full (attestix backend active)
        run: pytest -q -rs
